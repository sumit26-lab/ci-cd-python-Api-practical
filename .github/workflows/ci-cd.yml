name: Advanced CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - prod
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Enter Docker image tag to rollback (e.g. prod-abc123)"
        required: false

jobs:

  # 1. Lint Job
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install flake8

      - name: Run lint
        run: flake8 .

  # 2. Test Job
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: .

  # 3. Build & Push Docker Image
  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "tag=dev-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/prod" ]]; then
            echo "tag=prod-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sumitsinghchouhan/my-app:${{ steps.vars.outputs.tag }}
            sumitsinghchouhan/my-app:latest

  # 4. Deploy to EC2 (Auto for prod branch)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ needs.build.outputs.image_tag }}

            echo "Deploying image: $IMAGE_TAG"

            # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # Pull latest image
            sudo docker pull sumitsinghchouhan/my-app:$IMAGE_TAG

            # Stop and remove existing container
            sudo docker stop my-app || true
            sudo docker rm my-app || true

            # Run new container
            sudo docker run -d -p 5000:5000 \
              --name my-app \
              sumitsinghchouhan/my-app:$IMAGE_TAG

  # 5. Rollback Job (Manual Trigger)
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag != ''

    steps:
      - name: Rollback Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ github.event.inputs.rollback_tag }}

            echo "Rolling back to image: $IMAGE_TAG"

            # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # Pull rollback image
            sudo docker pull sumitsinghchouhan/my-app:$IMAGE_TAG

            # Stop & remove current container
            sudo docker stop my-app || true
            sudo docker rm my-app || true

            # Run rollback container
            sudo docker run -d -p 5000:5000 \
              --name my-app \
              sumitsinghchouhan/my-app:$IMAGE_TAG