name: Advanced CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - prod
  

jobs:

  # 1. Lint Job
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install flake8

      - name: Run lint
        run: flake8 .

  #  2. Test Job
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: .

  #  3. Build & Push Docker
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set Image Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "ref/head/dev" ]]; then
            echo "tag=dev-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          else 
            echo "tag=prod-${GITHUB_SHA}" >> $GITHUB_OUTPUT 
          fi
      

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sumitsinghchouhan/my-app:${{ steps.vars.outputs.tag}}

  #  4. Deploy to Prod
  
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH Prod EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi
            sudo docker pull sumitsinghchouhan/my-app:${{ github.sha }}
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            sudo docker run -d -p 5000:5000 --name my-app sumitsinghchouhan/my-app:${{ github.sha }}

